  event_bismarck_preview.3_tt:0 "@landowners! #gold #b Completed on Paternalistic Side:#!#! \n  • [SCOPE.gsInterestGroup('landowners_ig').GetName] loses the [GetIdeology('ideology_junker_paternalistic').GetName] [concept_ideology] and gains the [GetIdeology('ideology_bismarck_paternalistic_ig_landowners').GetName] $ideology$ \n  • [SCOPE.gsInterestGroup('landowners_ig').GetName] loses the [GetIdeology('ideology_hierarchic').GetName] [concept_ideology] and gains the [GetIdeology('ideology_bismarck_hierarchic_ig_landowners').GetName] $ideology$ \n  • [SCOPE.gsInterestGroup('industrialists_ig').GetName] loses the [GetIdeology('ideology_individualist').GetName] [concept_ideology] and gains the [GetIdeology('ideology_bismarck_individualist_ig_industrialist').GetName] $ideology$ \n  • [SCOPE.gsInterestGroup('landowners_ig').GetName] and [SCOPE.gsInterestGroup('industrialists_ig').GetName] get #tooltippable;tooltip:[GetPlayer.GetTooltipTag],bismarck_ig_bonus_tt $ig_bonus_bismarck$#! \n  • [SCOPE.gsInterestGroup('landowners_ig').GetName] and [SCOPE.gsInterestGroup('industrialists_ig').GetName] gain new IG traits. \n \n #b Choose either:#! \n  • [ROOT.GetCountry.GetName] receives #tooltippable;tooltip:[GetPlayer.GetTooltipTag],bismarck_reform1_bonus_tt $germany_bismarck_reform_1$#!\n  • [ROOT.GetCountry.GetName] receives #tooltippable;tooltip:[GetPlayer.GetTooltipTag],bismarck_reform2_bonus_tt $germany_bismarck_reform_2$#! \n\n\n@intelligentsia! #red #b Completed on Socialist Side:#!#! \n  • [SCOPE.gsInterestGroup('landowners_ig').GetName] loses the [GetIdeology('ideology_junker_paternalistic').GetName] [concept_ideology] and gains the [GetIdeology('ideology_bismarck_paternalistic_ig_landowners').GetName] $ideology$ \n  • [SCOPE.gsInterestGroup('landowners_ig').GetName] loses the [GetIdeology('ideology_hierarchic').GetName] [concept_ideology] and gains the [GetIdeology('ideology_bismarck_hierarchic_ig_landowners').GetName] $ideology$ \n  • [SCOPE.gsInterestGroup('intelligentsia_ig').GetName] loses the [GetIdeology('ideology_republican').GetName] [concept_ideology] and gains the [GetIdeology('ideology_bismarck_socialist').GetName] $ideology$ \n  • [SCOPE.gsInterestGroup('landowners_ig').GetName] and [SCOPE.gsInterestGroup('intelligentsia_ig').GetName] get #tooltippable;tooltip:[GetPlayer.GetTooltipTag],bismarck_ig_bonus_tt $ig_bonus_bismarck$#! \n  • [SCOPE.gsInterestGroup('landowners_ig').GetName] and [SCOPE.gsInterestGroup('intelligentsia_ig').GetName] gain new IG traits. \n  • [SCOPE.gsInterestGroup('intelligentsia_ig').GetName] will be renamed #v Internationalist#! \n \n #b Choose either:#! \n  • [ROOT.GetCountry.GetName] receives #tooltippable;tooltip:[GetPlayer.GetTooltipTag],bismarck_reform3_bonus_tt $germany_bismarck_reform_3$#!\n  • [ROOT.GetCountry.GetName] receives #tooltippable;tooltip:[GetPlayer.GetTooltipTag],bismarck_reform4_bonus_tt $germany_bismarck_reform_4$#!"

