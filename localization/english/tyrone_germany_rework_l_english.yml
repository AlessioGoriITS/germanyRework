  ideology_bismarck_paternalistic:0 "Bismarckian Paternalism"
  ideology_bismarck_paternalistic_desc:0 "A doctrine of calculated reform from above, Bismarckian Paternalism seeks to preserve order through state-guided welfare and firm control. The worker is to be protected, but never empowered beyond the bounds set by the state."
  ideology_bismarck_paternalistic_ig_landowners:0 "Bismarckian Paternalism"
  ideology_bismarck_paternalistic_ig_landowners_desc:0 "Among the landowning elite, paternalism is reshaped into a tool of preservation. Reform is accepted where necessary, so long as it strengthens hierarchy and secures the authority of the traditional order."
  ideology_bismarck_hierarchic_ig_landowners:0 "Bismarckian Hierarchic"
  ideology_bismarck_hierarchic_ig_landowners_desc:0 "A rigid belief in social hierarchy, tempered by pragmatic reform. Even within a structured order, limited concessions to the lower classes are tolerated to maintain stability and prevent unrest."
  ideology_bismarck_individualist_ig_industrialist:0 "Bismarckian Individualism"
  ideology_bismarck_individualist_ig_industrialist_desc:0 "Industrial progress and private initiative remain paramount, yet even the industrialist recognizes the necessity of state intervention to curb unrest. Welfare becomes a tool, not of equality, but of stability and productivity."
  ideology_bismarck_socialist:0 "Bismarckian Socialism"
  ideology_bismarck_socialist_desc:0 "Forged in the tension between state authority and popular agitation, this ideology embraces reform driven by pressure from below. It seeks to expand the rights and power of the workers, while still operating within the structures of the state."

  ig_trait_junkerdom_bismarck:0 "Junkerdom Ascendant"
  ig_trait_junkerdom_bismarck_desc:0 "Aligned with Bismarck’s vision, the landowning elite consolidate their influence over the state. Authority is strengthened, and loyalty is cultivated through a careful balance of tradition and controlled reform."
  ig_trait_intelligentsia_unhappy_bismarck:0 "Internationalist Discontent"
  ig_trait_intelligentsia_unhappy_bismarck_desc:0 "Disillusioned with the direction of the state, the intelligentsia turn increasingly toward internationalist thought. Their criticism undermines authority and fuels radical movements across society."
  ig_trait_intelligentsia_veryhappy_bismarck_win:0 "Reformist Internationalists"
  ig_trait_intelligentsia_veryhappy_bismarck_win_desc:0 "Buoyed by concessions won through pressure, the intelligentsia embrace an internationalist outlook while working within the system. Reform is accelerated, and opposition to change grows less volatile."
  ig_trait_intelligentsia_veryhappy_bismarck_fail:0 "Radicalized Internationalists"
  ig_trait_intelligentsia_veryhappy_bismarck_fail_desc:0 "The failure of state reform drives the intelligentsia toward a more radical internationalist stance. While still engaging with the political process, they increasingly push for systemic transformation."


  bismarckevents.1.t:0 "The Iron Chancellor"
  bismarckevents.1.d:0 "A nobleman named [SCOPE.sCharacter('bismarck_scope').GetFullName] has risen to a prominent position among the [ROOT.GetCountry.GetAdjectiveNoFormatting] [SCOPE.gsInterestGroup('junkers').GetName]. Advocating for German national unity and political pragmatism, he offers his services to the state."
  bismarckevents.1.f:0 ""I shall soon be compelled to undertake the conduct of the [ROOT.GetCountry.GetAdjectiveNoFormatting] Government. My first care will be to reorganize the army, with or without the help of the Landtag. As soon as the army shall have been brought into such a condition as to inspire respect, I shall seize the first best pretext to declare war against Austria, dissolve the German Diet, subdue the minor States, and give national unity to Germany under [ROOT.GetCountry.GetAdjectiveNoFormatting] leadership.""
  bismarckevents.1.a:0 "Appoint Bismarck as Chancellor."
  bismarckevents.1.b:0 "Realpolitik is not the right policy."

  bismarckevents.2.t:0 "The Iron Hand of Reform"
  bismarckevents.2.d:0 "Under the guidance of [SCOPE.sCharacter('bismarck_scope').GetFullName], the social question has been brought to heel. The [ROOT.GetCountry.GetAdjectiveNoFormatting] [SCOPE.gsInterestGroup('junkers').GetName] and the [ROOT.GetCountry.GetAdjectiveNoFormatting] [SCOPE.gsInterestGroup('industrialists').GetName] stand aligned behind the Chancellor, as reform is shaped not by agitation, but by the will of the state.\n\nConcessions are granted where necessary, yet always within a framework of order. The workers are provided for, but never empowered beyond their station."
  bismarckevents.2.f:0 "“Give the worker the right to work as long as he is healthy, assure him care when he is sick, and provide for him when he is old. If the state does this, then the socialist will find the ground less fertile.”"
  bismarckevents.2.a:0 "Secure Bismarck’s reforms."
  bismarckevents.2.b:0 "Enforce order through strength." 

  bismarckevents.3.t:0 "Socialist Reforms"
  bismarckevents.3.d:0 "Though [SCOPE.sCharacter('bismarck_scope').GetFullName] remains the architect of the nation’s policy, the intelligentsia and workers have left their mark. The reforms, once purely paternalistic, now carry the influence of socialist thought.\n\nThe [ROOT.GetCountry.GetAdjectiveNoFormatting] [SCOPE.gsInterestGroup('intelligentsia').GetName] emerge empowered, their internationalist ideas spreading as the state accommodates the demands of the populace."
  bismarckevents.3.f:0 "“Even iron can be shaped when pressed from both sides.”"
  bismarckevents.3.a:0 "Keep the Reform in Check."
  bismarckevents.3.b:0 "The Reforms Reach the Workers."

  bismarckevents.4.t:0 "Bismarck’s Reforms Collapse"
  bismarckevents.4.d:0 "With Bismarck gone from the country, the state is left rudderless. The promised reforms fail to materialize, and the [ROOT.GetCountry.GetAdjectiveNoFormatting] [SCOPE.gsInterestGroup('intelligentsia').GetName] and [SCOPE.gsInterestGroup('trade_union_ig').GetName] grow restless. Communist movements gain momentum, and the population reacts with rising agitation and organized unrest."
  bismarckevents.4.f:0 "“The soil was never prepared for revolution, yet the seeds take root when the gardener departs.”"
  bismarckevents.4.a:0 "The Revolution Gains Ground"

  bismarck_agitator1_tt:0 "A communist agitator will appear within the [SCOPE.gsInterestGroup('intelligentsia').GetName]."
  bismarck_agitator2_tt:0 "A communist leader will rise within the [SCOPE.gsInterestGroup('intelligentsia').GetName]."