  law_old_age_bismarck:0 "Workers’ Security Fund"
  law_old_age_bismarck_desc:0 "A state-directed system of worker security designed to provide for old age while preserving social order. Rather than empowering the labor movement, these measures bind the worker to the state, ensuring loyalty through controlled welfare."
  law_regulatory_bodies_bismarck:0 "State Regulatory Offices"
  law_regulatory_bodies_bismarck_desc:0 "Workplace conditions are overseen by state-appointed officials, enforcing safety standards while maintaining firm control over labor organization. These institutions aim to curb unrest without conceding political ground to socialist movements."
  law_public_health_insurance_bismarck:0 "Imperial Health Insurance"
  law_public_health_insurance_bismarck_desc:0 "A national health system funded in part by industrial contributions, extending care to the working population. While improving living conditions, it reinforces the authority of the state over both labor and capital."

  ideology_bismarck_paternalistic:0 "Bismarckian Paternalism"
  ideology_bismarck_paternalistic_desc:0 "A doctrine of calculated reform from above, Bismarckian Paternalism seeks to preserve order through state-guided welfare and firm control. The worker is to be protected, but never empowered beyond the bounds set by the state."
  ideology_bismarck_paternalistic_ig_landowners:0 "Bismarckian Paternalism"
  ideology_bismarck_paternalistic_ig_landowners_desc:0 "Among the landowning elite, paternalism is reshaped into a tool of preservation. Reform is accepted where necessary, so long as it strengthens hierarchy and secures the authority of the traditional order."
  ideology_bismarck_hierarchic_ig_landowners:0 "Bismarckian Hierarchic"
  ideology_bismarck_hierarchic_ig_landowners_desc:0 "A rigid belief in social hierarchy, tempered by pragmatic reform. Even within a structured order, limited concessions to the lower classes are tolerated to maintain stability and prevent unrest."
  ideology_bismarck_individualist_ig_industrialist:0 "Bismarckian Individualism"
  ideology_bismarck_individualist_ig_industrialist_desc:0 "Industrial progress and private initiative remain paramount, yet even the industrialist recognizes the necessity of state intervention to curb unrest. Welfare becomes a tool, not of equality, but of stability and productivity."
  ideology_bismarck_socialist:0 "Internationalist"
  ideology_bismarck_socialist_desc:0 "Forged in the tension between state authority and popular agitation, this ideology embraces reform driven by pressure from below. It seeks to expand the rights and power of the workers, while still operating within the structures of the state."
  ideology_bismarck_vanguardist:0 "Internationalist"
  ideology_bismarck_vanguardist_desc:0 "Rejecting both liberal compromise and traditional authority, this ideology calls for a disciplined vanguard to lead society toward revolutionary transformation. Political power is to be concentrated in the hands of those deemed capable of guiding the masses, with the state reorganized to enforce social and economic equality through decisive, centralized control."
  ig_internationalist_1:0 "Internationalist"
  ig_internationalist_1_desc:0 "Inspired by ideas that transcend borders, this group looks beyond the nation-state toward a broader solidarity of peoples. While not yet fully radicalized, they increasingly favor international cooperation and social reform over traditional structures of authority."
  ig_internationalist_2:0 "Revolutionäre Arbeiterfront"
  ig_internationalist_2_desc:0 "Forged in unrest and hardened by failure, this group has embraced its role as the vanguard of international revolution. Dismissing gradual reform, they advocate for centralized leadership and decisive action to reshape society along new ideological lines."
  ig_internationalist_3:0 "Einheitsfrontlied"
  ig_internationalist_2_desc:0 "Forged in unrest and hardened by failure, this group has embraced its role as the vanguard of international revolution. Dismissing gradual reform, they advocate for centralized leadership and decisive action to reshape society along new ideological lines."

  ig_trait_junkerdom_bismarck:0 "Junkerdom Ascendant"
  ig_trait_junkerdom_bismarck_desc:0 "Aligned with Bismarck’s vision, the landowning elite consolidate their influence over the state. Authority is strengthened, and loyalty is cultivated through a careful balance of tradition and controlled reform."
  ig_trait_intelligentsia_unhappy_bismarck:0 "Internationalist Discontent"
  ig_trait_intelligentsia_unhappy_bismarck_desc:0 "Disillusioned with the direction of the state, the intelligentsia turn increasingly toward internationalist thought. Their criticism undermines authority and fuels radical movements across society."
  ig_trait_intelligentsia_veryhappy_bismarck_win:0 "Reformist Internationalists"
  ig_trait_intelligentsia_veryhappy_bismarck_win_desc:0 "Buoyed by concessions won through pressure, the intelligentsia embrace an internationalist outlook while working within the system. Reform is accelerated, and opposition to change grows less volatile."
  ig_trait_intelligentsia_veryhappy_bismarck_fail:0 "Radicalized Internationalists"
  ig_trait_intelligentsia_veryhappy_bismarck_fail_desc:0 "The failure of state reform drives the intelligentsia toward a more radical internationalist stance. While still engaging with the political process, they increasingly push for systemic transformation."

